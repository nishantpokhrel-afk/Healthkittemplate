<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Audio Player</title>
<style>
 :root {
 --accent: #6366f1;
 --accent-contrast: #ffffff;
 --bg: #ffffff;
 --text-primary: #111827;
 --text-secondary: #6b7280;
 --border: #e5e7eb;
 --radius: 24px;
 --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
 }
 * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 html, body {
 margin: 0; padding: 0; height: 100%;
 background: var(--bg);
 font-family: var(--font-family);
 color: var(--text-primary);
 overscroll-behavior: none;
 }
 body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

 .header {
 display: flex; align-items: center; justify-content: space-between;
 padding: 54px 14px 14px; flex-shrink: 0;
 background: var(--header-bg, transparent);
 }
 .icon-btn {
 width: 36px; height: 36px; border: none; background: transparent;
 display: flex; align-items: center; justify-content: center;
 border-radius: 50%; cursor: pointer; color: var(--header-fg, var(--text-primary));
 touch-action: manipulation; user-select: none;
 }
 .icon-btn:active { background: rgba(0, 0, 0, .06); }
 .header-title {
 font-size: 12px; font-weight: 700; color: var(--header-fg, var(--text-secondary));
 letter-spacing: .08em; text-transform: uppercase;
 }
 .header-spacer { width: 36px; }

 main {
 flex: 1; display: flex; flex-direction: column;
 align-items: center; justify-content: flex-start;
 padding: 3vh 16px 220px;
 overflow-y: auto; min-height: 0;
 }

 .player-card {
 width: min(94vw, 380px);
 background: var(--card-bg, #ffffff);
 border-radius: var(--radius);
 box-shadow: 0 14px 34px -18px rgba(17, 24, 39, 0.22);
 padding: clamp(18px, 5vw, 28px) clamp(16px, 5vw, 24px) clamp(16px, 4vw, 26px);
 display: flex; flex-direction: column; align-items: center;
 }

 .art-wrap {
 position: relative;
 width: min(72vw, 280px);
 max-width: 100%;
 border-radius: calc(var(--radius) - 8px); overflow: hidden;
 background: linear-gradient(135deg, #eef0fd, #e3e5fb);
 box-shadow: 0 16px 34px -14px rgba(17, 24, 39, 0.28);
 flex-shrink: 0;
 }
 /* Square aspect ratio via the padding-percentage technique (percentages for padding are
 based on the containing block's width) rather than CSS aspect-ratio, so this keeps
 working on older WebView engines that don't support it. */
 .art-wrap::before { content: ''; display: block; padding-top: 100%; }
 .art-wrap img {
 position: absolute; top: 0; left: 0; right: 0; bottom: 0;
 width: 100%; height: 100%; object-fit: cover; display: block;
 }
 .art-placeholder {
 position: absolute; top: 0; left: 0; right: 0; bottom: 0;
 display: flex; align-items: center; justify-content: center;
 color: var(--accent); opacity: .45;
 }

 .meta { text-align: center; margin-top: 20px; width: 100%; }
 .track-title {
 font-size: 17px; font-weight: 700; margin: 0; line-height: 1.3;
 overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
 }

 .progress-wrap { width: 100%; margin-top: 26px; }
 .scrub-track {
 position: relative; height: 4px; background: var(--border);
 border-radius: 2px; cursor: pointer; touch-action: none;
 }
 .scrub-fill {
 position: absolute; top: 0; left: 0; height: 100%; width: 0%;
 background: var(--accent); border-radius: 2px; pointer-events: none;
 }
 .scrub-knob {
 position: absolute; top: 50%; left: 0%; width: 13px; height: 13px;
 background: var(--accent); border-radius: 50%;
 transform: translate(-50%, -50%); pointer-events: none;
 box-shadow: 0 0 0 4px rgba(99, 102, 241, .16);
 }
 .time-row {
 display: flex; justify-content: space-between; margin-top: 8px;
 font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums;
 }

 .controls {
 display: flex; align-items: center; justify-content: center;
 gap: 26px; margin-top: 30px;
 }
 .ctrl-btn {
 border: 1.5px solid var(--border); background: #ffffff;
 width: 46px; height: 46px; border-radius: 50%;
 display: flex; align-items: center; justify-content: center;
 cursor: pointer; color: var(--text-secondary);
 transition: border-color .15s ease, color .15s ease;
 touch-action: manipulation; user-select: none;
 }
 .ctrl-btn.active { border-color: var(--accent); color: var(--accent); }
 .ctrl-btn:active { transform: scale(.94); }

 /* Play control: a plain custom button that drives playback purely through the SoundCloud
 Widget JS API (a script call, not a simulated click). An earlier version tried faking a
 real click by cropping/scaling the actual SoundCloud iframe control underneath this
 button - that relied on CSS transform + touch hit-testing lining up perfectly, which is
 unreliable on mobile WebViews. There it was landing on SoundCloud's own link/branding
 instead of its play button, and mobile OS-level Universal/App Links intercepted that tap
 and handed it off to the native SoundCloud app - a failure mode that doesn't exist on
 desktop web (no app to hand off to), which is exactly why it "worked on web, opened
 SoundCloud on mobile." A script call can never trigger navigation, so it's safe on both. */
 .play-btn {
 width: 72px; height: 72px; border-radius: 50%;
 background: var(--accent); border: none;
 display: flex; align-items: center; justify-content: center;
 color: var(--accent-contrast); cursor: pointer;
 box-shadow: 0 12px 26px -10px rgba(99, 102, 241, .6);
 touch-action: manipulation; user-select: none;
 }
 .play-btn:active { transform: scale(.96); }
 .play-btn svg { margin-left: 2px; }
 .play-btn.is-playing svg { margin-left: 0; }

 /* Real, unscaled, genuinely visible SoundCloud strip - the actual playback engine and a
 manual fallback if the API call above doesn't survive a platform's autoplay-gesture
 policy. Kept at its natural size (not cropped/scaled/hidden): every "disguise it" trick
 tried before either got auto-paused (when hidden/off-screen) or mis-hit a link (when
 scaled), so this stays exactly as SoundCloud renders it. */
 .sc-fallback {
 width: 100%; max-width: 260px; margin-top: 18px;
 border-radius: 10px; overflow: hidden;
 }
 #sc-frame { display: block; width: 100%; height: 20px; border: 0; }
 .other-tracks {
 width: min(94vw, 380px); margin-top: 18px;
 }
 .other-tracks-label {
 font-size: 11px; font-weight: 700; color: var(--text-secondary);
 letter-spacing: .06em; text-transform: uppercase; margin: 0 0 10px 2px;
 }
 .track-item {
 display: flex; align-items: center; gap: 12px;
 width: 100%; padding: 12px 14px; border: none;
 background: var(--card-bg, #ffffff);
 border-radius: 16px;
 box-shadow: 0 8px 20px -14px rgba(17, 24, 39, 0.25);
 color: var(--text-primary); text-align: left; cursor: pointer;
 touch-action: manipulation; user-select: none;
 margin-bottom: 10px;
 }
 .track-item:last-child { margin-bottom: 0; }
 .track-item:active { transform: scale(.98); }
 .track-item-icon {
 width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
 background: var(--accent); color: var(--accent-contrast);
 display: flex; align-items: center; justify-content: center;
 }
 .track-item-title {
 font-size: 14px; font-weight: 600;
 overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
 }

 /* ===== TEMPORARY DEBUG PANEL - remove this whole rule block when done debugging ===== */
 #debugPanel {
 position: fixed; left: 0; right: 0; bottom: 0; z-index: 9999;
 background: #0b1020; color: #cbd5e1;
 font: 11px/1.45 "SFMono-Regular", Consolas, Menlo, monospace;
 border-top: 1px solid #1f2937;
 }
 #debugLog {
 max-height: 30vh; overflow-y: auto; padding: 6px 10px;
 }
 #debugLog .dbg-line { padding: 1px 0; word-break: break-all; }
 #debugLog .dbg-error { color: #fca5a5; }
 #debugLog .dbg-warn { color: #fcd34d; }
 #debugLog .dbg-info { color: #93c5fd; }
 #debugVersion {
 padding: 4px 10px; font-size: 10px; color: #64748b;
 border-top: 1px solid #1f2937; text-align: right;
 }
 /* ===== END TEMPORARY DEBUG PANEL ===== */
</style>
</head>
<body>

 <div class="header">
 <div class="header-spacer"></div>
 <div class="header-title" id="headerTitle">Now Playing</div>
 <button class="icon-btn" id="closeBtn" aria-label="Close">
 <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
 </button>
 </div>

 <main>
 <div class="player-card">
 <div class="art-wrap" id="artWrap">
 <div class="art-placeholder">
 <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
 </div>
 </div>

 <div class="meta">
 <p class="track-title" id="trackTitle">Loading&hellip;</p>
 </div>

 <div class="progress-wrap">
 <div class="scrub-track" id="scrubTrack">
 <div class="scrub-fill" id="scrubFill"></div>
 <div class="scrub-knob" id="scrubKnob"></div>
 </div>
 <div class="time-row">
 <span id="curTime">0:00</span>
 <span id="durTime">0:00</span>
 </div>
 </div>

 <div class="controls">
 <button class="ctrl-btn" id="loopBtn" aria-label="Loop">
 <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
 </button>

 <button class="play-btn" id="playBtn" aria-label="Play">
 <svg id="playIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
 </button>

 <button class="ctrl-btn" id="muteBtn" aria-label="Mute">
 <svg id="muteIcon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 9 3 15 8 15 13 20 13 4 8 9 3 9" fill="currentColor" stroke="none"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>
 </button>
 </div>

 <div class="sc-fallback">
 <iframe id="sc-frame" title="SoundCloud player" allow="autoplay"></iframe>
 </div>
 </div>

 <div class="other-tracks" id="otherTracks" style="display:none">
 <p class="other-tracks-label">Audio Library</p>
 <div id="otherTracksList"></div>
 </div>
 </main>

 <script id="sc-api-script" src="https://w.soundcloud.com/player/api.js"></script>

 <!-- ===== TEMPORARY DEBUG PANEL - remove this whole block when done debugging ===== -->
 <div id="debugPanel">
 <div id="debugLog"></div>
 <div id="debugVersion"></div>
 </div>
 <!-- ===== END TEMPORARY DEBUG PANEL ===== -->

 <script>
 (function () {
 'use strict';

 var TEMPLATE_VERSION = '4.2.0';

 // ===== TEMPORARY DEBUG PANEL - remove this whole block when done debugging =====
 var debugLogEl = document.getElementById('debugLog');
 var debugVersionEl = document.getElementById('debugVersion');
 if (debugVersionEl) debugVersionEl.textContent = 'Audio Player Template v' + TEMPLATE_VERSION;
 function debugLog(level, msg) {
 if (!debugLogEl) return;
 var line = document.createElement('div');
 line.className = 'dbg-line dbg-' + level;
 var ts = new Date().toISOString().split('T')[1].replace('Z', '');
 line.textContent = '[' + ts + '] ' + msg;
 debugLogEl.appendChild(line);
 debugLogEl.scrollTop = debugLogEl.scrollHeight;
 }
 window.addEventListener('error', function (e) {
 debugLog('error', 'window error: ' + (e.message || e) + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
 });
 window.addEventListener('unhandledrejection', function (e) {
 debugLog('error', 'unhandled rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
 });
 var scScript = document.getElementById('sc-api-script');
 if (scScript) {
 scScript.addEventListener('load', function () { debugLog('info', 'SoundCloud api.js loaded, window.SC = ' + (typeof window.SC)); });
 scScript.addEventListener('error', function () { debugLog('error', 'SoundCloud api.js FAILED to load (network/CSP blocked on this device?)'); });
 }
 debugLog('info', 'Template v' + TEMPLATE_VERSION + ' script starting');
 // ===== END TEMPORARY DEBUG PANEL SETUP =====

 // ---------- Icon markup ----------
 var PLAY_SVG = '<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
 var PAUSE_SVG = '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
 var VOLUME_SVG = '<svg id="muteIcon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 9 3 15 8 15 13 20 13 4 8 9 3 9" fill="currentColor" stroke="none"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
 var MUTE_SVG = '<svg id="muteIcon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 9 3 15 8 15 13 20 13 4 8 9 3 9" fill="currentColor" stroke="none"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>';

 // ---------- Bridge setup ----------
 // IMPORTANT: window.ReactNativeWebView is checked at CALL TIME below, not cached once at
 // parse time. Caching it in a variable at script start has previously caused total bridge
 // failure on some Android WebView versions where the native bridge object isn't injected
 // into the page's global scope until slightly after the script first runs - a cached
 // check would then be permanently wrong for the rest of the session.
 function isNativeNow() {
 return typeof window.ReactNativeWebView !== 'undefined' && !!window.ReactNativeWebView;
 }
 debugLog('info', 'Platform at parse time: ' + (isNativeNow() ? 'native (WebView)' : 'web'));

 function postToApp(key, data) {
 var text = JSON.stringify({ key: key, data: data === undefined ? null : data });
 // Broadcast to every possible target - whichever is actually listening picks it up,
 // the others are harmless no-ops (e.g. no parent frame exists on mobile).
 try { if (isNativeNow()) window.ReactNativeWebView.postMessage(text); } catch (e) { debugLog('error', 'postMessage to RN failed: ' + e); }
 try { if (window.parent && window.parent !== window) window.parent.postMessage(text, '*'); } catch (e) { }
 }

 var _reqId = 0;
 var _pending = {};
 function restRequest(method, model, data, specialParams) {
 return new Promise(function (resolve, reject) {
 var id = 'req-' + (++_reqId);
 _pending[id] = { resolve: resolve, reject: reject };
 var text = JSON.stringify({
 key: 'REST_REQUEST', method: method, model: model, data: data, id: id,
 specialParams: specialParams || null
 });
 try { if (isNativeNow()) window.ReactNativeWebView.postMessage(text); } catch (e) { debugLog('error', 'REST_REQUEST postMessage to RN failed: ' + e); }
 try { if (window.parent && window.parent !== window) window.parent.postMessage(text, '*'); } catch (e) { }
 });
 }

 var state = {};
 var REQUIRED = ['API', 'USER', 'AUTH', 'ACTIVITY', 'ACTIVITY_RESPONSE', 'CONFIG', 'QUESTIONS'];
 var started = false;
 var quitSent = false;

 function onMessage(event) {
 try {
 // Some Android WebView versions deliver event.data already parsed as an object
 // rather than a JSON string - JSON.parse-ing an object stringifies it to
 // "[object Object]" first and then fails, silently dropping every bridge message.
 var raw = event && event.data;
 var message = (typeof raw === 'string') ? JSON.parse(raw) : raw;
 if (!message || !message.key) return;
 handleMessage(message);
 } catch (e) {
 debugLog('error', 'onMessage parse failed: ' + e);
 }
 }
 document.addEventListener('message', onMessage); // Android RN
 window.addEventListener('message', onMessage); // iOS RN + web

 function handleMessage(message) {
 if (message.key === 'REQUEST_RESPONSE') {
 if (message.error) debugLog('error', 'REQUEST_RESPONSE [' + message.id + '] error: ' + message.error);
 var p = _pending[message.id];
 if (p) {
 delete _pending[message.id];
 if (message.error) { p.reject(new Error(message.error)); }
 else { p.resolve(message.data); }
 }
 return;
 }
 debugLog('info', 'received ' + message.key);
 state[message.key] = message.data;
 if (!started && REQUIRED.every(function (k) { return state[k] !== undefined; })) {
 started = true;
 debugLog('info', 'all required init messages received - starting template');
 startTemplate();
 }
 }

 // Send the ready signal immediately, then retry twice on a short delay - on some
 // devices the native bridge isn't fully attached the instant the load event fires,
 // so a single early signal can be missed with nothing left to retry it.
 function sendReady() {
 debugLog('info', 'sending READY_DYNAMIC_MEDIA (native=' + isNativeNow() + ')');
 postToApp('READY_DYNAMIC_MEDIA');
 }
 window.addEventListener('load', function () {
 debugLog('info', 'window loaded');
 sendReady();
 setTimeout(sendReady, 150);
 setTimeout(sendReady, 600);
 setTimeout(function () {
 if (!started) debugLog('error', 'still no required init messages 5s after load - bridge may not be connected');
 }, 5000);
 });

 // ---------- DOM refs ----------
 var els = {
 art: document.getElementById('artWrap'),
 title: document.getElementById('trackTitle'),
 scrubTrack: document.getElementById('scrubTrack'),
 scrubFill: document.getElementById('scrubFill'),
 scrubKnob: document.getElementById('scrubKnob'),
 curTime: document.getElementById('curTime'),
 durTime: document.getElementById('durTime'),
 loopBtn: document.getElementById('loopBtn'),
 muteBtn: document.getElementById('muteBtn'),
 playBtn: document.getElementById('playBtn'),
 closeBtn: document.getElementById('closeBtn'),
 scFrame: document.getElementById('sc-frame'),
 headerTitle: document.getElementById('headerTitle'),
 otherTracks: document.getElementById('otherTracks'),
 otherTracksList: document.getElementById('otherTracksList')
 };

 // ---------- Theme ----------
 // Picks white or dark text based on the relative luminance of a hex color, so header
 // text/icons stay readable no matter what color the App sets.
 function readableTextColor(hex) {
 if (!hex) return '#111827';
 var h = hex.replace('#', '');
 if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
 if (h.length !== 6) return '#111827';
 var r = parseInt(h.substr(0, 2), 16) / 255;
 var g = parseInt(h.substr(2, 2), 16) / 255;
 var b = parseInt(h.substr(4, 2), 16) / 255;
 var lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
 return lum > 0.55 ? '#111827' : '#ffffff';
 }
 function getAppTheme() {
 var appId = state.ACTIVITY_RESPONSE && state.ACTIVITY_RESPONSE.app;
 if (!appId) return Promise.resolve({});
 return restRequest('get', 'App', appId).then(function (app) {
 return (app && app.theme) || {};
 })["catch"](function () { return {}; });
 }
 function getPlatformTheme() {
 return restRequest('list', 'Settings', {}).then(function (result) {
 return (result && result.items && result.items.length) ? (result.items[0].theme || {}) : {};
 })["catch"](function () { return {}; });
 }
 function applyTheme() {
 Promise.all([getAppTheme(), getPlatformTheme()]).then(function (results) {
 var appTheme = results[0], platformTheme = results[1];
 debugLog('info', 'theme loaded (appTheme keys: ' + Object.keys(appTheme || {}).join(',') + ')');
 var root = document.documentElement;
 var primary = (appTheme.colors && appTheme.colors.primary) || (platformTheme.colors && platformTheme.colors.primary);
 if (primary) root.style.setProperty('--accent', primary);

 // App-level "light" color - Settings has no light field, so this only ever comes
 // from the App's own theme, not the platform fallback.
 var light = appTheme.colors && appTheme.colors.light;
 if (light) root.style.setProperty('--bg', light);

 // Activity header bar color - App-level only, respects the "transparent" flag.
 var activityHeader = appTheme.activityHeader;
 if (activityHeader && !activityHeader.transparent && activityHeader.color) {
 root.style.setProperty('--header-bg', activityHeader.color);
 root.style.setProperty('--header-fg', readableTextColor(activityHeader.color));
 }

 var rounded = appTheme.rounded || platformTheme.rounded;
 var radiusMap = { NONE: '0px', SMALL: '10px', MEDIUM: '18px', LARGE: '28px', FULL: '36px' };
 if (rounded && radiusMap[rounded]) root.style.setProperty('--radius', radiusMap[rounded]);
 })["catch"](function (err) { debugLog('error', 'theme load failed: ' + err); });
 }

 // ---------- Content helpers ----------
 // The Text field is rich text - if it was pasted/auto-linked, the visible text may not be
 // the actual URL. Prefer a real <a href>, then fall back to scanning the plain text for a URL.
 function extractUrl(html) {
 if (!html) return '';
 var tmp = document.createElement('div');
 tmp.innerHTML = html;
 var anchor = tmp.querySelector('a[href]');
 if (anchor) {
 var href = anchor.getAttribute('href');
 if (href) return href.trim();
 }
 var text = (tmp.textContent || tmp.innerText || '').trim();
 var match = text.match(/https?:\/\/[^\s"'<>]+/i);
 return match ? match[0] : text;
 }
 function resolveFileUrl(fileId) {
 if (!fileId) return Promise.resolve(null);
 debugLog('info', 'resolving File id: ' + fileId);
 return restRequest('get', 'File', fileId).then(function (file) {
 debugLog('info', 'File resolved: ' + (file && file.url ? file.url : '(no url)'));
 return (file && file.url) ? file.url : null;
 })["catch"](function (err) {
 debugLog('error', 'File resolve failed: ' + (err && err.message ? err.message : err));
 return null;
 });
 }

 function formatTime(sec) {
 if (!isFinite(sec) || sec < 0) sec = 0;
 var m = Math.floor(sec / 60);
 var s = Math.floor(sec % 60);
 return m + ':' + (s < 10 ? '0' : '') + s;
 }

 // ---------- Player state ----------
 var widget = null;
 var widgetReady = false;
 var pendingPlay = false;
 var duration = 0;
 var isPlaying = false;
 var isLooping = false;
 var isMuted = false;
 var lastVolume = 100;
 var isScrubbing = false;
 var userPaused = false;
 var lastPlayAt = 0;
 var autoResumeAttempts = 0;

 function setPlayIcon(playing) {
 els.playBtn.innerHTML = playing ? PAUSE_SVG : PLAY_SVG;
 els.playBtn.classList.toggle('is-playing', playing);
 els.playBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
 }
 function setLoopActive(active) {
 els.loopBtn.classList.toggle('active', active);
 els.loopBtn.setAttribute('aria-pressed', active ? 'true' : 'false');
 }
 function setMuteIcon(muted) {
 els.muteBtn.innerHTML = muted ? MUTE_SVG : VOLUME_SVG;
 els.muteBtn.classList.toggle('active', muted);
 els.muteBtn.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
 }
 function updateProgress(positionMs) {
 if (!duration) return;
 var ratio = Math.min(1, Math.max(0, positionMs / duration));
 els.scrubFill.style.width = (ratio * 100) + '%';
 els.scrubKnob.style.left = (ratio * 100) + '%';
 els.curTime.textContent = formatTime(positionMs / 1000);
 }

 // ---------- Startup ----------
 // Multi-track support: every Question with a resolvable SoundCloud URL in its Text field
 // is a selectable track. Switching tracks happens IN PLACE (re-pointing the same iframe
 // at a new URL with auto_play=true) rather than by navigating the page - an earlier
 // version used "window.location.href = ..." to force a full reload, but the Cogniss
 // WebView container intercepts top-level navigations away from the loaded template and
 // hands them off to an external browser (which is why it was "taking to GitHub" - that's
 // simply where this file happens to be hosted). Assigning a brand-new iframe src with
 // auto_play=true directly inside a real click handler is the standard, well-supported way
 // browsers allow autoplay: it's a fresh media context created within a genuine gesture,
 // not a command relayed into an already-loaded frame - so it needs no navigation at all.
 function getTracks() {
 var questions = state.QUESTIONS || [];
 var tracks = [];
 for (var i = 0; i < questions.length; i++) {
 var q = questions[i];
 var url = q ? extractUrl(q.text).trim() : '';
 if (url && /^https?:\/\//i.test(url)) {
 tracks.push({ label: q.label || ('Track ' + (i + 1)), url: url, image: q.image, imageMedia: q.imageMedia });
 }
 }
 debugLog('info', 'tracks found: ' + tracks.length);
 return tracks;
 }

 var allTracks = [];
 var activeTrackIndex = 0;

 function startTemplate() {
 applyTheme();

 var activityName = state.ACTIVITY && state.ACTIVITY.name;
 if (activityName) els.headerTitle.textContent = activityName;

 allTracks = getTracks();
 if (!allTracks.length) {
 els.title.textContent = 'No track configured';
 debugLog('error', 'No usable track URL found in any Question');
 return;
 }

 loadTrack(0, false);
 }

 function loadTrack(idx, autoplay) {
 if (idx < 0 || idx >= allTracks.length) return;
 activeTrackIndex = idx;
 var track = allTracks[idx];
 debugLog('info', 'loading track ' + idx + ' (' + track.label + '), autoplay=' + autoplay);

 els.title.textContent = track.label || 'Unknown track';
 els.art.innerHTML = '<div class="art-placeholder"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>';

 if (track.imageMedia && track.imageMedia.url) {
 setAlbumArt(track.imageMedia.url);
 } else if (track.image) {
 resolveFileUrl(track.image).then(function (url) {
 if (url) setAlbumArt(url);
 });
 }

 initSoundCloud(track.url, autoplay);
 renderOtherTracks();
 }

 function renderOtherTracks() {
 if (allTracks.length < 2) {
 els.otherTracks.style.display = 'none';
 return;
 }
 els.otherTracksList.innerHTML = '';
 allTracks.forEach(function (t, idx) {
 if (idx === activeTrackIndex) return;
 var row = document.createElement('button');
 row.className = 'track-item';
 row.type = 'button';
 row.innerHTML =
 '<span class="track-item-icon">' +
 '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' +
 '</span>' +
 '<span class="track-item-title"></span>';
 row.querySelector('.track-item-title').textContent = t.label || 'Untitled track';
 row.addEventListener('click', guarded(function () {
 debugLog('info', 'track item tapped: ' + idx);
 loadTrack(idx, true);
 }));
 els.otherTracksList.appendChild(row);
 });
 els.otherTracks.style.display = 'block';
 }

 function setAlbumArt(url) {
 var img = document.createElement('img');
 img.alt = 'Album art';
 img.onload = function () { debugLog('info', 'album art loaded'); };
 img.onerror = function () { debugLog('error', 'album art FAILED to load: ' + url); };
 img.src = url;
 els.art.innerHTML = '';
 els.art.appendChild(img);
 }

 function initSoundCloud(trackUrl, autoplay) {
 var src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(trackUrl) +
 '&auto_play=' + (autoplay ? 'true' : 'false') + '&hide_related=true&show_comments=false&show_user=false' +
 '&show_reposts=false&show_teaser=false&visual=false&buying=false&sharing=false&download=false';
 debugLog('info', 'SC iframe src set (autoplay=' + autoplay + '): ' + src);
 widgetReady = false;
 els.scFrame.onerror = function () { debugLog('error', 'sc-frame iframe errored while loading'); };
 els.scFrame.src = src;

 var readyTimeout = setTimeout(function () {
 if (!widgetReady) debugLog('error', 'SC widget never became READY within 12s');
 }, 12000);

 els.scFrame.onload = function () {
 debugLog('info', 'sc-frame onload fired');
 if (!window.SC) {
 debugLog('error', 'window.SC is undefined - api.js did not load/run on this device');
 return;
 }
 widget = SC.Widget(els.scFrame);
 debugLog('info', 'SC.Widget(iframe) created');

 widget.bind(SC.Widget.Events.READY, function () {
 clearTimeout(readyTimeout);
 widgetReady = true;
 debugLog('info', 'SC widget READY');
 widget.getDuration(function (ms) {
 duration = ms;
 debugLog('info', 'duration = ' + ms + 'ms');
 els.durTime.textContent = formatTime(ms / 1000);
 });
 widget.getVolume(function (v) { lastVolume = v > 0 ? v : 100; });
 if (pendingPlay) {
 pendingPlay = false;
 debugLog('info', 'flushing pending play request');
 widget.play();
 }
 });

 widget.bind(SC.Widget.Events.PLAY, function () {
 isPlaying = true;
 lastPlayAt = Date.now();
 debugLog('info', 'SC widget PLAY');
 setPlayIcon(true);
 });

 widget.bind(SC.Widget.Events.PAUSE, function () {
 isPlaying = false;
 setPlayIcon(false);
 var msSincePlay = Date.now() - lastPlayAt;
 debugLog('info', 'SC widget PAUSE (userPaused=' + userPaused + ', ' + msSincePlay + 'ms after last PLAY)');
 // Self-heal: if playback stops on its own very shortly after we asked it to play
 // (not because the user tapped pause), retry once - a safety net for platforms
 // where the very first play() in a session needs a nudge.
 if (!userPaused && msSincePlay < 1500 && autoResumeAttempts < 1) {
 autoResumeAttempts++;
 debugLog('warn', 'unexpected auto-pause shortly after play - retrying once');
 setTimeout(function () { if (widget) widget.play(); }, 150);
 }
 userPaused = false;
 });

 widget.bind(SC.Widget.Events.PLAY_PROGRESS, function (data) {
 if (!isScrubbing) updateProgress(data.currentPosition);
 if (data.currentPosition > 3000) autoResumeAttempts = 0;
 });

 widget.bind(SC.Widget.Events.ERROR, function (e) {
 debugLog('error', 'SC widget ERROR event: ' + JSON.stringify(e));
 });

 widget.bind(SC.Widget.Events.FINISH, function () {
 isPlaying = false;
 autoResumeAttempts = 0;
 setPlayIcon(false);
 if (isLooping) {
 widget.seekTo(0);
 widget.play();
 } else {
 updateProgress(0);
 }
 });
 };
 }

 // ---------- Controls ----------
 // Loop and mute don't "start" playback, so they aren't subject to the autoplay-gesture
 // restriction that affects play() - these remain fully driven by the Widget API.
 var lastActionAt = 0;
 function guarded(fn) {
 return function (evt) {
 var now = Date.now();
 if (now - lastActionAt < 350) return;
 lastActionAt = now;
 fn(evt);
 };
 }

 els.playBtn.addEventListener('click', guarded(function () {
 debugLog('info', 'play button tapped (widget=' + (!!widget) + ', widgetReady=' + widgetReady + ', isPlaying=' + isPlaying + ')');
 if (!widget) {
 if (!widgetReady) pendingPlay = true;
 return;
 }
 if (isPlaying) {
 userPaused = true;
 widget.pause();
 } else {
 widget.play();
 }
 }));

 els.loopBtn.addEventListener('click', guarded(function () {
 isLooping = !isLooping;
 setLoopActive(isLooping);
 }));

 els.muteBtn.addEventListener('click', guarded(function () {
 if (!widget) return;
 if (isMuted) {
 widget.setVolume(lastVolume || 100);
 isMuted = false;
 } else {
 widget.getVolume(function (v) {
 if (v > 0) lastVolume = v;
 });
 widget.setVolume(0);
 isMuted = true;
 }
 setMuteIcon(isMuted);
 }));

 // ---------- Scrub bar ----------
 function ratioFromEvent(evt) {
 var rect = els.scrubTrack.getBoundingClientRect();
 var clientX = evt.touches && evt.touches[0] ? evt.touches[0].clientX : evt.clientX;
 var x = clientX - rect.left;
 return Math.min(1, Math.max(0, x / rect.width));
 }
 function paintScrub(ratio) {
 els.scrubFill.style.width = (ratio * 100) + '%';
 els.scrubKnob.style.left = (ratio * 100) + '%';
 els.curTime.textContent = formatTime((ratio * duration) / 1000);
 }
 function handleScrubMove(evt) {
 if (evt.cancelable) evt.preventDefault();
 paintScrub(ratioFromEvent(evt));
 }
 function endScrub(evt) {
 var ratio;
 if (evt.changedTouches && evt.changedTouches[0]) {
 ratio = ratioFromEvent({ touches: evt.changedTouches });
 } else {
 ratio = ratioFromEvent(evt);
 }
 isScrubbing = false;
 window.removeEventListener('mousemove', handleScrubMove);
 window.removeEventListener('mouseup', endScrub);
 window.removeEventListener('touchmove', handleScrubMove);
 window.removeEventListener('touchend', endScrub);
 if (widget && duration) widget.seekTo(ratio * duration);
 }
 function beginScrub(evt) {
 if (!duration) return;
 isScrubbing = true;
 paintScrub(ratioFromEvent(evt));
 window.addEventListener('mousemove', handleScrubMove);
 window.addEventListener('mouseup', endScrub);
 window.addEventListener('touchmove', handleScrubMove, { passive: false });
 window.addEventListener('touchend', endScrub);
 }
 els.scrubTrack.addEventListener('mousedown', beginScrub);
 els.scrubTrack.addEventListener('touchstart', beginScrub, { passive: false });

 // ---------- Header close ----------
 els.closeBtn.addEventListener('click', function () {
 if (quitSent) return;
 quitSent = true;
 postToApp('QUIT', { completeState: 'COMPLETE' });
 });

 })();
 </script>

</body>
</html>
