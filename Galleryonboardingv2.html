<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Onboarding</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      height: 100%; width: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --accent-done:    rgba(74,144,217,0.5);
      --safe-top:       env(safe-area-inset-top,  0px);
      --safe-bottom:    env(safe-area-inset-bottom, 0px);
      --dot-active:     #ffffff;
      --dot-inactive:   rgba(255,255,255,0.35);
      /* Theme tokens — overridden at runtime from App/Settings */
      --color-primary:  #4A90D9;
      --radius-option:  999px;
      --radius-action:  999px;
    }

    #shell.theme-light {
      --dot-active:   #1a1a1a;
      --dot-inactive: rgba(0,0,0,0.30);
    }

    /* ─── Shell ─────────────────────────────── */
    #shell {
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Content column — centred, max width on wide screens */
    #header, #title, #content, #footer {
      width: 100%;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── Background ─────────────────────────── */
    #bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #222;
    }
    #bg img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    #bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.00) 30%,
        rgba(0,0,0,0.55) 72%,
        rgba(0,0,0,0.85) 100%
      );
    }

    /* ─── Loading ────────────────────────────── */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.55);
      color: #ffffff;
      font-size: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Error screen ───────────────────────── */
    #error-screen {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 32px;
      text-align: center;
      background: rgba(0,0,0,0.72);
      color: #ffffff;
    }
    #error-screen .err-icon {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2.5px solid #e74c3c;
      display: flex; align-items: center; justify-content: center;
    }
    #error-screen h2 { font-size: 18px; font-weight: 700; }
    #error-screen p  { font-size: 14px; opacity: 0.8; line-height: 1.5; max-width: 260px; }
    #error-retry {
      padding: 12px 32px;
      border-radius: var(--radius-pill);
      border: 2px solid #ffffff;
      background: transparent;
      color: #ffffff;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
    }
    #error-close {
      background: none; border: none;
      color: rgba(255,255,255,0.6);
      font-size: 13px; cursor: pointer;
      text-decoration: underline;
    }

    /* ─── Layout layers ──────────────────────── */
    #header, #title, #footer {
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    #content {
      position: relative;
      z-index: 1;
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 200px 20px 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    /* ─── Header — progress dots ─────────────── */
    #header {
      padding-top: max(80px, calc(var(--safe-top) + 80px));
      padding-bottom: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dot-inactive);
      transition: background 0.25s, transform 0.2s;
    }
    .dot.active { background: var(--dot-active); transform: scale(1.25); }
    .dot.done   { background: var(--accent-done); }

    /* ─── Title ──────────────────────────────── */
    #title {
      padding: 8px 24px 0;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--dot-active);
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      min-height: 36px;
    }

    /* ─── Shared content text ────────────────── */
    .content-text {
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
      margin-bottom: 4px;
    }

    /* ─── Choice group ───────────────────────── */
    .choice-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-top: 16px;
      margin-bottom: 20px;
    }

    /* ── DEFAULT — centred pill buttons ────────── */
    .opt-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 55%;
      max-width: 100%;
      padding: 13px 28px;
      border-radius: var(--radius-option);
      border: 2px solid rgba(255,255,255,0.70);
      background: transparent;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }
    .opt-pill:active { transform: scale(0.96); }
    .opt-pill.sel {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #ffffff;
    }

    /* ── CHECKBOX — full-width rows with tick ─── */
    .opt-check {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 16px;
      border-radius: var(--radius-option);
      border: 2px solid rgba(255,255,255,0.50);
      background: transparent;
      color: #ffffff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .opt-check:active { transform: scale(0.98); }
    .opt-check.sel {
      background: rgba(255,255,255,0.10);
      border-color: var(--color-primary);
    }

    /* Checkbox square */
    .chk-box {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.60);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .opt-check.sel .chk-box {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    .opt-check.sel .chk-box::after {
      content: '';
      display: block;
      width: 5px; height: 9px;
      border-right: 2.5px solid #ffffff;
      border-bottom: 2.5px solid #ffffff;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .chk-label { flex: 1; }

    /* ─── Footer ─────────────────────────────── */
    #footer {
      padding: 12px 20px;
      padding-bottom: max(62px, calc(var(--safe-bottom) + 50px));
      display: flex;
      justify-content: center;
    }
    #continue-btn {
      padding: 14px 44px;
      border-radius: var(--radius-action);
      border: none;
      background: var(--color-primary);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      opacity: 0.45;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #continue-btn.ready { opacity: 1; pointer-events: auto; }
    #continue-btn.ready:active { transform: scale(0.96); }

    /* ─── Slide transition ───────────────────── */
    .slide-in { animation: slideIn 0.26s ease forwards; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0);    }
    }
  </style>
</head>
<body>
<div id="shell">

  <!-- Full-page background -->
  <div id="bg">
    <div id="bg-overlay"></div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading…</span>
  </div>

  <!-- Error -->
  <div id="error-screen">
    <div class="err-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <line x1="14" y1="7" x2="14" y2="16" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="14" cy="21" r="1.5" fill="#e74c3c"/>
      </svg>
    </div>
    <h2>Something went wrong</h2>
    <p id="error-msg">We couldn't load this activity. Please check your connection and try again.</p>
    <button id="error-retry">Try again</button>
    <button id="error-close">Close</button>
  </div>

  <!-- Progress dots -->
  <div id="header"></div>

  <!-- Page title (data label) -->
  <div id="title"></div>

  <!-- Content -->
  <div id="content"></div>

  <!-- Footer -->
  <div id="footer">
    <button id="continue-btn">Continue</button>
  </div>

</div>
<script>
'use strict';

// ═══════════════════════════════════════════════
//  BRIDGE
// ═══════════════════════════════════════════════

var isNative = (typeof window.ReactNativeWebView !== 'undefined');

function postToApp(key, data) {
  try {
    var text = JSON.stringify({ key: key, data: data !== undefined ? data : null });
    if (isNative) window.ReactNativeWebView.postMessage(text);
    else window.parent.postMessage(text, '*');
  } catch (e) {}
}

function postRestRequest(id, method, model, data) {
  try {
    var text = JSON.stringify({ key: 'REST_REQUEST', id: id, method: method, model: model, data: data, specialParams: null });
    if (isNative) window.ReactNativeWebView.postMessage(text);
    else window.parent.postMessage(text, '*');
  } catch (e) {}
}

// Both listeners needed: Android fires on document, iOS/web on window
var _lastMsg = null;
function onMessage(evt) {
  try {
    if (!evt.data || evt.data === _lastMsg) return;
    _lastMsg = evt.data;
    var msg = JSON.parse(evt.data);
    if (!msg || !msg.key) return;
    handleMessage(msg);
  } catch (e) {}
}
document.addEventListener('message', onMessage);
window.addEventListener('message', onMessage);

// ═══════════════════════════════════════════════
//  REST_REQUEST — promise helper
// ═══════════════════════════════════════════════

var _reqId   = 0;
var _pending = {};

function restRequest(method, model, data) {
  return new Promise(function(resolve, reject) {
    var id = 'r' + (++_reqId);
    _pending[id] = { resolve: resolve, reject: reject };
    postRestRequest(id, method, model, data);
  });
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════

var state = {
  gotQuestions:   false,
  gotActivity:    false,
  gotConfig:      false,
  ready:          false,
  questions:      null,
  currentIndex:   0,
  appId:          null,   // from ACTIVITY_RESPONSE — used to fetch app theme
  selections:     {},
  startTimes:     {},
  submitting:     false,
  submitTimer:    null
};

// ═══════════════════════════════════════════════
//  MEDIA
// ═══════════════════════════════════════════════

var _mediaCache = {};
var _renderGen  = 0;
var _cacheBust  = '?_t=' + Date.now();

function fetchMedia(fileId, cb) {
  if (!fileId) { cb(null); return; }
  if (Object.prototype.hasOwnProperty.call(_mediaCache, fileId)) { cb(_mediaCache[fileId]); return; }
  var gen = _renderGen;
  restRequest('get', 'File', fileId)
    .then(function(file) {
      if (_renderGen !== gen) return;
      var url = (file && file.url) ? file.url + _cacheBust : null;
      _mediaCache[fileId] = url;
      cb(url);
    })
    .catch(function() {
      if (_renderGen !== gen) return;
      _mediaCache[fileId] = null;
      cb(null);
    });
}

// ═══════════════════════════════════════════════
//  INBOUND MESSAGES
// ═══════════════════════════════════════════════

function handleMessage(msg) {
  switch (msg.key) {

    case 'QUESTIONS':
      if (state.ready) break;
      var all = Array.isArray(msg.data) ? msg.data : [];
      state.questions = all.filter(function(q) {
        return q && (q.type === 'IMAGE_CONTENT' || q.type === 'MULTICHOICE');
      });
      state.gotQuestions = true;
      checkReady();
      break;

    case 'ACTIVITY_RESPONSE':
      if (msg.data && msg.data.app) state.appId = msg.data.app;
      break;

    case 'ACTIVITY':
      state.gotActivity = true;
      checkReady();
      break;

    case 'CONFIG':
      state.gotConfig = true;
      checkReady();
      break;

    case 'QUESTION_RESPONSE':
      // Container confirmed answer — advance
      if (state.submitting) {
        clearTimeout(state.submitTimer);
        state.submitting = false;
        setTimeout(advance, 0);
      }
      break;

    case 'REQUEST_RESPONSE':
      var p = _pending[msg.id];
      if (p) {
        delete _pending[msg.id];
        if (msg.error) p.reject(new Error(msg.error));
        else p.resolve(msg.data);
      }
      break;
  }
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════

var _initTimer = setTimeout(function() {
  if (!state.ready) showError('Activity took too long to load. Please close and try again.');
}, 10000);

function checkReady() {
  if (state.ready) return;
  if (state.gotQuestions && state.gotActivity && state.gotConfig) {
    state.ready = true;
    clearTimeout(_initTimer);
    init();
  }
}

function init() {
  if (!state.questions || state.questions.length === 0) {
    showError('No content blocks found for this activity.');
    return;
  }
  hideLoading();
  // Fetch theme then render — fall back to defaults if it fails
  applyTheme(function() {
    renderProgress();
    renderQuestion(0);
  });
}

// ═══════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════

var RADIUS_MAP = { NONE: '0px', SMALL: '4px', MEDIUM: '8px', LARGE: '16px', FULL: '9999px' };

function applyTheme(cb) {
  var appTheme      = {};
  var platformTheme = {};
  var done          = 0;

  function finish() {
    done++;
    if (done < 2) return;
    // Merge: app takes precedence
    var colors = Object.assign({}, platformTheme.colors || {}, appTheme.colors || {});
    var rounded = appTheme.rounded || platformTheme.rounded;
    var optionTile = appTheme.borderStyle && appTheme.borderStyle.optionTile;
    var root = document.documentElement;

    if (colors.primary) root.style.setProperty('--color-primary', colors.primary);

    // Button radius from optionTile borderStyle, falling back to global rounded
    var baseRadius   = RADIUS_MAP[rounded]    || '999px';
    var optionRadius = RADIUS_MAP[optionTile] || baseRadius;
    root.style.setProperty('--radius-option', optionRadius);
    root.style.setProperty('--radius-action', baseRadius);

    cb();
  }

  // Fetch App theme (needs app ID from ACTIVITY_RESPONSE)
  if (state.appId) {
    restRequest('get', 'App', state.appId)
      .then(function(app) { appTheme = (app && app.theme) || {}; finish(); })
      .catch(function() { finish(); });
  } else {
    finish(); // skip app theme if no ID
  }

  // Fetch platform Settings theme
  restRequest('list', 'Settings', {})
    .then(function(res) {
      var items = res && res.items;
      platformTheme = (items && items.length > 0 && items[0].theme) || {};
      finish();
    })
    .catch(function() { finish(); });
}

// ═══════════════════════════════════════════════
//  RENDER — PROGRESS DOTS
// ═══════════════════════════════════════════════

function renderProgress() {
  var header = document.getElementById('header');
  header.innerHTML = '';
  for (var i = 0; i < state.questions.length; i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === state.currentIndex ? ' active' : i < state.currentIndex ? ' done' : '');
    header.appendChild(dot);
  }
}

// ═══════════════════════════════════════════════
//  RENDER — QUESTION
// ═══════════════════════════════════════════════

function renderQuestion(idx) {
  var q = state.questions[idx];
  if (!q) return;

  _renderGen++;

  document.getElementById('title').textContent = q.label || q.dataLabel || '';
  setBackground(q.image);

  var isLast = (idx === state.questions.length - 1);
  document.getElementById('continue-btn').textContent = isLast ? 'Finish' : 'Continue';

  var area = document.getElementById('content');
  area.innerHTML = '';
  area.className = '';
  void area.offsetWidth;
  area.className = 'slide-in';

  if (q.type === 'IMAGE_CONTENT') {
    renderImageContent(q, area);
  } else {
    renderMultichoice(q, area);
  }
}

// ─── Background + contrast ───────────────────

function setBackground(imageId) {
  if (!imageId) return;
  var bg = document.getElementById('bg');
  var existing = bg.querySelector('img');
  if (existing && existing.dataset.fileId === imageId) return;

  var gen = _renderGen;
  fetchMedia(imageId, function(url) {
    if (!url || _renderGen !== gen) return;
    var old = bg.querySelector('img');
    if (old) old.remove();
    var img = document.createElement('img');
    img.dataset.fileId = imageId;
    img.alt = '';
    img.crossOrigin = 'anonymous';
    img.onload = function() { analyseContrast(img); };
    img.src = url;
    bg.insertBefore(img, bg.firstChild);
  });
}

function analyseContrast(img) {
  try {
    var W = 40; var H = 40;
    var canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    var ctx = canvas.getContext('2d');
    if (!ctx) return;
    ctx.drawImage(img, 0, 0, W, H);
    var pixels = ctx.getImageData(0, 0, W, Math.floor(H / 3)).data;
    var sum = 0; var n = 0;
    for (var i = 0; i < pixels.length; i += 4) {
      sum += 0.2126 * pixels[i] + 0.7152 * pixels[i + 1] + 0.0722 * pixels[i + 2];
      n++;
    }
    var shell = document.getElementById('shell');
    if (n > 0 && (sum / n) > 200) shell.classList.add('theme-light');
    else shell.classList.remove('theme-light');
  } catch (e) {}
}

// ─── IMAGE_CONTENT ────────────────────────────

function renderImageContent(q, area) {
  if (q.text) {
    var el = document.createElement('div');
    el.className = 'content-text';
    el.textContent = q.text;
    area.appendChild(el);
  }
  setContinue(true);
}

// ─── MULTICHOICE ─────────────────────────────
// Supports optionDisplayType:
//   'DEFAULT'  → centred pill buttons
//   anything else → full-width checkbox rows

function renderMultichoice(q, area) {
  var qId = q.id || q._id;

  if (!state.selections[qId]) {
    state.selections[qId] = null;
    state.startTimes[qId] = Date.now();
  }

  var isCheckbox   = q.optionDisplayType !== 'DEFAULT';
  var opts         = Array.isArray(q.options) ? q.options : [];
  var currentSelId = state.selections[qId];

  // Face label (question text)
  if (q.text) {
    var lbl = document.createElement('div');
    lbl.className = 'content-text';
    lbl.textContent = q.text;
    area.appendChild(lbl);
  }

  var group = document.createElement('div');
  group.className = 'choice-group';

  opts.forEach(function(opt) {
    if (!opt || (!opt.id && !opt._id)) return;
    var optId = opt.id || opt._id;
    var label = opt.label || opt.text || '';
    var isSel = (currentSelId === optId);

    var btn = document.createElement('button');

    if (isCheckbox) {
      btn.className = 'opt-check' + (isSel ? ' sel' : '');

      var box = document.createElement('div');
      box.className = 'chk-box';
      btn.appendChild(box);

      var lblEl = document.createElement('span');
      lblEl.className = 'chk-label';
      lblEl.textContent = label;
      btn.appendChild(lblEl);

    } else {
      btn.className = 'opt-pill' + (isSel ? ' sel' : '');
      btn.textContent = label;
    }

    btn.addEventListener('click', function() {
      if (state.submitting) return;

      if (state.selections[qId] === optId) {
        // Tap same option again — deselect
        state.selections[qId] = null;
        btn.classList.remove('sel');
        setContinue(false);
      } else {
        // Select this option, clear others
        group.querySelectorAll('.opt-pill, .opt-check').forEach(function(b) { b.classList.remove('sel'); });
        state.selections[qId] = optId;
        btn.classList.add('sel');
        setContinue(true);
      }
    });

    group.appendChild(btn);
  });

  area.appendChild(group);
  setContinue(currentSelId !== null);
}

// ═══════════════════════════════════════════════
//  SUBMIT & ADVANCE
// ═══════════════════════════════════════════════

document.getElementById('continue-btn').addEventListener('click', function() {
  if (state.submitting) return;

  var q = state.questions[state.currentIndex];
  if (!q) return;

  state.submitting = true;
  setContinue(false);

  if (q.type === 'IMAGE_CONTENT') {
    postToApp('NEXT_QUESTION');
    setTimeout(advance, 0);
    return;
  }

  // MULTICHOICE — submit selected option using non-linear index mode.
  // The container resolves the question from the index — no 'question' field needed.
  var qId    = q.id || q._id;
  var optId  = state.selections[qId];
  if (!optId) { state.submitting = false; setContinue(false); return; }

  var duration = Math.round((Date.now() - (state.startTimes[qId] || Date.now())) / 1000);
  var data = {
    index:    state.currentIndex,
    option:   { _id: optId },
    duration: duration
  };

  postToApp('QUESTION_RESPONSE', data);

  // Safety fallback — advance after 4s if container never responds
  state.submitTimer = setTimeout(function() {
    if (state.submitting) { state.submitting = false; advance(); }
  }, 4000);
});

function advance() {
  state.submitting = false;
  if (state.currentIndex < state.questions.length - 1) {
    state.currentIndex++;
    renderProgress();
    renderQuestion(state.currentIndex);
  } else {
    postToApp('QUIT', { completeState: 'COMPLETE' });
  }
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════

function setContinue(enabled) {
  var btn = document.getElementById('continue-btn');
  if (enabled) btn.classList.add('ready');
  else btn.classList.remove('ready');
}

function hideLoading() {
  var el = document.getElementById('loading');
  if (el) el.style.display = 'none';
}

function showError(msg) {
  hideLoading();
  document.getElementById('error-msg').textContent = msg || 'Something went wrong.';
  document.getElementById('error-screen').style.display = 'flex';
}

document.getElementById('error-retry').addEventListener('click', function() {
  document.getElementById('error-screen').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  state.gotQuestions = false;
  state.gotActivity  = false;
  state.gotConfig    = false;
  state.ready        = false;
  state.questions    = null;
  state.currentIndex = 0;
  postToApp('READY_DYNAMIC_MEDIA');
});

document.getElementById('error-close').addEventListener('click', function() {
  postToApp('QUIT', { completeState: 'INCOMPLETE' });
});

// ═══════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════
postToApp('READY_DYNAMIC_MEDIA');
</script>
</body>
</html>
